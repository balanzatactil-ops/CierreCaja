<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cierres de Caja — Panel de Control</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --border:    #2a2d3a;
    --accent:    #6c8fff;
    --accent2:   #4ecdc4;
    --accent3:   #f7b731;
    --danger:    #ff6b6b;
    --text:      #e8eaf0;
    --muted:     #7b7f96;
    --success:   #51cf66;
    --font-ui:   'Inter', system-ui, sans-serif;
    --font-data: 'JetBrains Mono', 'Courier New', monospace;
    --radius:    12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-ui); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px 40px; width: 100%; max-width: 380px; text-align: center; }
  .login-logo { margin-bottom: 4px; }
  .login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .login-box input { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; margin-bottom: 12px; outline: none; transition: border-color .2s; }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .login-box button:hover { opacity: .85; }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 10px; display: none; }

  /* APP */
  #app { display: none; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { font-size: 20px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .btn-refresh { background: var(--border); border: none; color: var(--text); padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .2s; }
  .btn-refresh:hover { background: #353848; }
  .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; transition: all .2s; }
  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* FILTROS */
  .filters { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .filter-group { display: flex; align-items: center; gap: 8px; }
  .filter-group label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .filters select, .filters input[type="date"] { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: var(--radius-sm); font-size: 13px; outline: none; cursor: pointer; }
  .filters select:focus, .filters input[type="date"]:focus { border-color: var(--accent); }
  .btn-export { margin-left: auto; background: var(--accent3); color: #1a1a1a; border: none; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity .2s; }
  .btn-export:hover { opacity: .85; }

  /* MAIN */
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* KPIS */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .kpi.k1::before { background: var(--accent); }
  .kpi.k2::before { background: var(--success); }
  .kpi.k3::before { background: var(--accent2); }
  .kpi.k4::before { background: var(--accent3); }
  .kpi.k5::before { background: var(--danger); }
  .kpi.k6::before { background: var(--muted); }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .kpi-value { font-family: var(--font-data); font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* GRÁFICOS */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .chart-card.wide { grid-column: 1 / -1; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }
  .chart-wrap.tall { height: 300px; }

  /* TABLA */
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--bg); color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; padding: 10px 16px; text-align: left; white-space: nowrap; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(108,143,255,.05); }
  tbody td { padding: 11px 16px; color: var(--text); white-space: nowrap; }
  .num { font-family: var(--font-data); text-align: right; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-blue  { background: rgba(108,143,255,.15); color: var(--accent); }
  .badge-green { background: rgba(81,207,102,.15);  color: var(--success); }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; padding: 80px 24px; flex-direction: column; gap: 16px; color: var(--muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    header { padding: 0 16px; }
    .filters { padding: 10px 16px; }
    main { padding: 16px; }
    .charts-grid { grid-template-columns: 1fr; }
    .chart-card.wide { grid-column: 1; }
    .kpi-value { font-size: 22px; }
    .btn-export span { display: none; }
  }
</style>
</head>

<script>
// ══ CONFIGURACIÓN ══════════════════════════════════════════
const CSV_URL  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTWNUkKS0H71tS_z_nupTrWrYsK5ybigBqKdwPs1N1rk4kHFY9yBzHh8Aipl2-mSPhYLa2xzfgVleu/pub?output=csv';
const PASSWORD = 'manolita2026'; // ← CAMBIA ESTA CONTRASEÑA

// ══ AUTH ═══════════════════════════════════════════════════
function login() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === PASSWORD) {
    sessionStorage.setItem('auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    cargarDatos();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}

function logout() {
  sessionStorage.removeItem('auth');
  location.reload();
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

if (sessionStorage.getItem('auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ══ PARSEAR NÚMERO ══════════════════════════════════════════
// Maneja tanto "2382.5" (de Google Sheets) como "1.277,50" (formato ES)
function parseNum(s) {
  if (!s) return 0;
  const limpio = String(s).replace(/['"€\s]/g, '').trim();
  if (!limpio) return 0;
  // Formato europeo con punto de miles y coma decimal: 1.277,50
  if (limpio.match(/^\d{1,3}(\.\d{3})+(,\d+)?$/)) {
    return parseFloat(limpio.replace(/\./g, '').replace(',', '.')) || 0;
  }
  // Formato con coma decimal sin punto de miles: 277,50
  if (limpio.match(/^\d+(,\d+)$/)) {
    return parseFloat(limpio.replace(',', '.')) || 0;
  }
  // Formato estándar con punto decimal: 2382.5
  return parseFloat(limpio) || 0;
}

function parseFecha(s) {
  if (!s) return null;
  const p = String(s).trim().split('/');
  if (p.length === 3) return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  return new Date(s);
}

function formatEur(n) {
  return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' }).format(n || 0);
}

function formatFecha(d) {
  if (!d) return '';
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

// ══ DATOS ══════════════════════════════════════════════════
let todosLosDatos = [];
let charts = {};

// Parsear CSV respetando campos entre comillas
function parseCSV(text) {
  const rows = [];
  const lines = text.trim().split('\n');
  for (const line of lines) {
    const cols = [];
    let cur = '';
    let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

async function cargarDatos() {
  document.getElementById('main-content').innerHTML =
    '<div class="loading"><div class="spinner"></div><span>Actualizando...</span></div>';

  try {
    const resp = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await resp.text();
    const filas = parseCSV(text).slice(1); // quitar cabecera

    todosLosDatos = filas
      .map(c => ({
        fecha:      parseFecha(c[0]),
        fechaStr:   (c[0] || '').replace(/"/g,''),
        emision:    (c[1] || '').replace(/"/g,''),
        numCierre:  (c[2] || '').replace(/"/g,''),
        cif:        (c[3] || '').replace(/"/g,''),
        local:      (c[4] || '').replace(/"/g,''),
        comercial:  (c[5] || '').replace(/"/g,''),
        caja:       (c[6] || '').replace(/"/g,''),
        operador:   (c[7] || '').replace(/"/g,''),
        total:      parseNum(c[8]),
        base:       parseNum(c[9]),
        iva:        parseNum(c[10]),
        descuentos: parseNum(c[11]),
        efectivo:   parseNum(c[12]),
        tarjeta:    parseNum(c[13]),
        bizum:      parseNum(c[14]),
        registros:  parseInt((c[15]||'0').replace(/"/g,'')) || 0,
        version:    (c[16] || '').replace(/"/g,''),
      }))
      .filter(r => r.fecha && r.total > 0)
      .sort((a, b) => b.fecha - a.fecha);

    // Poblar selector de operadores
    const ops = [...new Set(todosLosDatos.map(r => r.operador).filter(Boolean))].sort();
    const sel = document.getElementById('f-operador');
    sel.innerHTML = '<option value="">Todos</option>';
    ops.forEach(op => sel.innerHTML += `<option value="${op}">${op}</option>`);

    // Fechas por defecto: últimos 90 días
    const hoy = new Date();
    const hace90 = new Date(); hace90.setDate(hace90.getDate() - 90);
    if (!document.getElementById('f-desde').value)
      document.getElementById('f-desde').valueAsDate = hace90;
    if (!document.getElementById('f-hasta').value)
      document.getElementById('f-hasta').valueAsDate = hoy;

    document.getElementById('last-update').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString('es-ES');

    renderizar();

  } catch(e) {
    document.getElementById('main-content').innerHTML =
      '<div class="loading">⚠️ Error cargando datos. Comprueba la URL del CSV.</div>';
    console.error(e);
  }
}

// ══ FILTRAR ════════════════════════════════════════════════
function filtrar() {
  const desde = document.getElementById('f-desde').value;
  const hasta = document.getElementById('f-hasta').value;
  const op    = document.getElementById('f-operador').value;
  return todosLosDatos.filter(r => {
    if (desde && r.fecha < new Date(desde)) return false;
    if (hasta && r.fecha > new Date(hasta + 'T23:59:59')) return false;
    if (op && r.operador !== op) return false;
    return true;
  });
}

// ══ RENDERIZAR ═════════════════════════════════════════════
function renderizar() {
  const datos = filtrar();
  if (datos.length === 0) {
    document.getElementById('main-content').innerHTML =
      '<div class="loading">Sin datos para el periodo seleccionado.</div>';
    return;
  }

  const totalVentas   = datos.reduce((a,r) => a + r.total, 0);
  const totalEfectivo = datos.reduce((a,r) => a + r.efectivo, 0);
  const totalTarjeta  = datos.reduce((a,r) => a + r.tarjeta, 0);
  const totalBizum    = datos.reduce((a,r) => a + r.bizum, 0);
  const totalIVA      = datos.reduce((a,r) => a + r.iva, 0);
  const totalRegs     = datos.reduce((a,r) => a + r.registros, 0);
  const ticketMedio   = totalRegs > 0 ? totalVentas / totalRegs : 0;

  const agrup      = document.getElementById('f-agrupacion').value;
  const porPeriodo = agruparPorPeriodo(datos, agrup);
  const periodos   = Object.keys(porPeriodo).sort();
  const ventasPer  = periodos.map(p => porPeriodo[p].total);
  const porMes     = agruparPorPeriodo(datos, 'mes');

  document.getElementById('main-content').innerHTML = `
    <div class="kpis">
      <div class="kpi k1">
        <div class="kpi-label">Ventas Totales</div>
        <div class="kpi-value">${formatEur(totalVentas)}</div>
        <div class="kpi-sub">${datos.length} cierres</div>
      </div>
      <div class="kpi k2">
        <div class="kpi-label">Efectivo</div>
        <div class="kpi-value">${formatEur(totalEfectivo)}</div>
        <div class="kpi-sub">${totalVentas ? Math.round(totalEfectivo/totalVentas*100) : 0}% del total</div>
      </div>
      <div class="kpi k3">
        <div class="kpi-label">Tarjeta</div>
        <div class="kpi-value">${formatEur(totalTarjeta)}</div>
        <div class="kpi-sub">${totalVentas ? Math.round(totalTarjeta/totalVentas*100) : 0}% del total</div>
      </div>
      <div class="kpi k4">
        <div class="kpi-label">Ticket Medio</div>
        <div class="kpi-value">${formatEur(ticketMedio)}</div>
        <div class="kpi-sub">por transacción</div>
      </div>
      <div class="kpi k5">
        <div class="kpi-label">IVA Acumulado</div>
        <div class="kpi-value">${formatEur(totalIVA)}</div>
        <div class="kpi-sub">base: ${formatEur(datos.reduce((a,r)=>a+r.base,0))}</div>
      </div>
      <div class="kpi k6">
        <div class="kpi-label">Bizum</div>
        <div class="kpi-value">${formatEur(totalBizum)}</div>
        <div class="kpi-sub">${totalVentas ? Math.round(totalBizum/totalVentas*100) : 0}% del total</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card wide">
        <div class="chart-title">Evolución de Ventas</div>
        <div class="chart-wrap tall"><canvas id="chart-evolucion"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Métodos de Pago</div>
        <div class="chart-wrap"><canvas id="chart-pagos"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Ventas por Día de la Semana</div>
        <div class="chart-wrap"><canvas id="chart-semana"></canvas></div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">Resumen por Mes</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Mes</th><th>Cierres</th>
            <th class="num">Ventas</th><th class="num">Efectivo</th>
            <th class="num">Tarjeta</th><th class="num">Bizum</th>
            <th class="num">IVA</th><th class="num">Ticket Medio</th>
          </tr></thead>
          <tbody id="tbody-meses"></tbody>
        </table>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">Últimos Cierres</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Fecha</th><th>Nº</th><th>Operador</th>
            <th class="num">Total</th><th class="num">Efectivo</th>
            <th class="num">Tarjeta</th><th class="num">Bizum</th>
            <th class="num">IVA</th><th class="num">Registros</th>
          </tr></thead>
          <tbody id="tbody-cierres"></tbody>
        </table>
      </div>
    </div>
  `;

  // Gráfico evolución
  destroyChart('chart-evolucion');
  charts['chart-evolucion'] = new Chart(document.getElementById('chart-evolucion'), {
    type: 'line',
    data: {
      labels: periodos,
      datasets: [{
        label: 'Ventas',
        data: ventasPer,
        borderColor: '#6c8fff',
        backgroundColor: 'rgba(108,143,255,.08)',
        fill: true,
        tension: .35,
        pointRadius: periodos.length > 30 ? 0 : 4,
        pointHoverRadius: 6,
      }]
    },
    options: chartOpts()
  });

  // Gráfico pagos
  destroyChart('chart-pagos');
  charts['chart-pagos'] = new Chart(document.getElementById('chart-pagos'), {
    type: 'doughnut',
    data: {
      labels: ['Efectivo','Tarjeta','Bizum'],
      datasets: [{
        data: [totalEfectivo, totalTarjeta, totalBizum],
        backgroundColor: ['#51cf66','#6c8fff','#4ecdc4'],
        borderWidth: 0,
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position:'bottom', labels:{ color:'#7b7f96', font:{size:12} } },
        tooltip: { callbacks: { label: ctx => ' ' + formatEur(ctx.parsed) } }
      },
      cutout: '65%',
    }
  });

  // Gráfico por día de semana
  const diasNombres = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const porDia = [0,0,0,0,0,0,0];
  datos.forEach(r => { if(r.fecha) porDia[r.fecha.getDay()] += r.total; });

  destroyChart('chart-semana');
  charts['chart-semana'] = new Chart(document.getElementById('chart-semana'), {
    type: 'bar',
    data: {
      labels: diasNombres,
      datasets: [{
        label: 'Ventas',
        data: porDia,
        backgroundColor: porDia.map((_,i) => i===0||i===6 ? '#f7b731' : '#6c8fff'),
        borderRadius: 6,
      }]
    },
    options: chartOpts()
  });

  // Tabla meses
  const meses = Object.keys(porMes).sort().reverse();
  document.getElementById('tbody-meses').innerHTML = meses.map(mes => {
    const m = porMes[mes];
    const tm = m.registros > 0 ? m.total / m.registros : 0;
    return `<tr>
      <td><strong>${mes}</strong></td>
      <td><span class="badge badge-blue">${m.count}</span></td>
      <td class="num"><strong>${formatEur(m.total)}</strong></td>
      <td class="num">${formatEur(m.efectivo)}</td>
      <td class="num">${formatEur(m.tarjeta)}</td>
      <td class="num">${formatEur(m.bizum)}</td>
      <td class="num">${formatEur(m.iva)}</td>
      <td class="num">${formatEur(tm)}</td>
    </tr>`;
  }).join('');

  // Tabla cierres
  document.getElementById('tbody-cierres').innerHTML = datos.slice(0,50).map(r => `
    <tr>
      <td>${formatFecha(r.fecha)}</td>
      <td><span class="badge badge-blue">${r.numCierre}</span></td>
      <td>${r.operador}</td>
      <td class="num"><strong>${formatEur(r.total)}</strong></td>
      <td class="num">${formatEur(r.efectivo)}</td>
      <td class="num">${formatEur(r.tarjeta)}</td>
      <td class="num">${formatEur(r.bizum)}</td>
      <td class="num">${formatEur(r.iva)}</td>
      <td class="num">${r.registros}</td>
    </tr>
  `).join('');
}

// ══ HELPERS ════════════════════════════════════════════════
function agruparPorPeriodo(datos, agrup) {
  const res = {};
  datos.forEach(r => {
    if (!r.fecha) return;
    let key;
    if (agrup === 'dia') {
      key = r.fecha.toLocaleDateString('es-ES');
    } else if (agrup === 'semana') {
      const d = new Date(r.fecha);
      d.setDate(d.getDate() - d.getDay() + 1);
      key = 'Sem ' + d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});
    } else {
      key = r.fecha.toLocaleDateString('es-ES', {month:'short', year:'numeric'});
    }
    if (!res[key]) res[key] = { total:0, efectivo:0, tarjeta:0, bizum:0, iva:0, registros:0, count:0 };
    res[key].total    += r.total;
    res[key].efectivo += r.efectivo;
    res[key].tarjeta  += r.tarjeta;
    res[key].bizum    += r.bizum;
    res[key].iva      += r.iva;
    res[key].registros+= r.registros;
    res[key].count++;
  });
  return res;
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function chartOpts() {
  return {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode:'index', intersect:false },
    plugins: {
      legend: { display:false },
      tooltip: {
        backgroundColor: '#1a1d27',
        borderColor: '#2a2d3a',
        borderWidth: 1,
        titleColor: '#e8eaf0',
        bodyColor: '#7b7f96',
        callbacks: { label: ctx => ' ' + formatEur(ctx.parsed.y ?? ctx.parsed) }
      }
    },
    scales: {
      x: { grid:{ color:'#2a2d3a' }, ticks:{ color:'#7b7f96', maxTicksLimit:10, font:{size:11} } },
      y: { grid:{ color:'#2a2d3a' }, ticks:{ color:'#7b7f96', font:{size:11}, callback: v => '€' + v.toLocaleString('es-ES') } }
    }
  };
}

// ══ EXPORT CSV ══════════════════════════════════════════════
function exportarCSV() {
  const datos = filtrar();
  const cols  = ['Fecha','Nº Cierre','Operador','Total','Efectivo','Tarjeta','Bizum','IVA','Base','Registros'];
  const filas = datos.map(r => [
    formatFecha(r.fecha), r.numCierre, r.operador,
    r.total, r.efectivo, r.tarjeta, r.bizum, r.iva, r.base, r.registros
  ].join(';'));
  const csv  = [cols.join(';'), ...filas].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type:'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'cierres_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
}

// ══ FILTROS EN TIEMPO REAL ══════════════════════════════════
['f-desde','f-hasta','f-operador','f-agrupacion'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderizar);
});

// ══ INIT ═══════════════════════════════════════════════════
if (sessionStorage.getItem('auth') === '1') cargarDatos();
</script>
